name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - run: rustup default stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
      - run: cargo test
